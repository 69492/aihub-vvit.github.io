<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Invaders</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-size: 16px;
        }
        body {
            background-color: #000;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 800px;
            padding: 20px;
            position: relative;
        }
        .header {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 24px;
            position: relative;
        }
        .score-level {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: 10px;
        }
        canvas {
            border: 2px solid #333;
            background-color: black;
            max-width: 100%;
            height: auto;
        }
        #scoreBoard, #levelBoard {
            font-size: 24px;
            margin: 0;
            color: #fff;
        }
        #restartButton {
            display: none;
            margin-top: 20px;
            font-size: 20px;
            padding: 10px 20px;
            cursor: pointer;
            background-color: #4CAF50;
            border: none;
            color: white;
            border-radius: 5px;
        }
        #restartButton:hover {
            background-color: #45a049;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            font-size: 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            z-index: 100;
        }
        .back-btn:hover {
            background-color: #45a049;
        }
        h1 {
            font-size: 36px;
            margin: 20px 0 10px 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="handleBack()">← Back</button>
    <div class="game-container">
        <div class="header">
            <h1>Space Invaders</h1>
            <div class="score-level">
                <div id="scoreBoard">Score: 0</div>
                <div id="levelBoard">Level: 1</div>
            </div>
        </div>
        <canvas id="gameCanvas" width="600" height="700"></canvas>
    </div>
    <button id="restartButton" onclick="restartGame()">Restart Game</button>

    <script>
        // Back button handler
        function handleBack() {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage('navigate_back', '*');
            } else {
                window.history.back();
            }
        }

        // Game setup
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreBoard = document.getElementById("scoreBoard");
        const levelBoard = document.getElementById("levelBoard");
        const restartButton = document.getElementById("restartButton");

        // Game constants
        const SPACESHIP_SPEED = 8;
        const BULLET_SPEED = 7;
        const ALIEN_SPEED = 2;
        const SHOOT_COOLDOWN = 400;
        const ALIEN_BULLET_SPEED = 5;
        const ALIEN_SHOOT_COOLDOWN = 1500;

        // Game state
        let lastShotTime = 0;
        let lastAlienShotTime = 0;
        let gameOver = false;
        let score = 0;
        let level = 1;
        let startX;

        // Game classes
        class Spaceship {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 50;
                this.height = 50;
            }

            draw() {
                ctx.fillStyle = 'white';
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }

            move(direction) {
                if (direction === "left" && this.x > 0) {
                    this.x -= SPACESHIP_SPEED;
                }
                if (direction === "right" && this.x < canvas.width - this.width) {
                    this.x += SPACESHIP_SPEED;
                }
            }

            shoot() {
                let now = Date.now();
                if (now - lastShotTime > SHOOT_COOLDOWN) {
                    bullets.push(new Bullet(this.x + this.width / 2, this.y));
                    lastShotTime = now;
                }
            }
        }

        class Bullet {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 3;
                this.height = 15;
            }

            draw() {
                ctx.fillStyle = 'white';
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }

            update() {
                this.y -= BULLET_SPEED;
            }
        }

        class Alien {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 40;
                this.height = 40;
                this.moveDirection = 1;
                this.moveCounter = 0;
            }

            draw() {
                ctx.fillStyle = 'green';
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }

            update() {
                this.x += this.moveDirection * ALIEN_SPEED;
                this.moveCounter++;
                if (this.moveCounter > 75) {
                    this.moveDirection *= -1;
                    this.moveCounter = 0;
                    this.y += 20; // Move down when changing direction
                }
            }

            shoot() {
                let now = Date.now();
                if (now - lastAlienShotTime > ALIEN_SHOOT_COOLDOWN) {
                    alienBullets.push(new AlienBullet(this.x + this.width / 2, this.y + this.height));
                    lastAlienShotTime = now;
                }
            }
        }

        class AlienBullet {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 3;
                this.height = 15;
            }

            draw() {
                ctx.fillStyle = 'red';
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }

            update() {
                this.y += ALIEN_BULLET_SPEED;
            }
        }

        // Game objects
        let spaceship, bullets, aliens, alienBullets;

        function initializeGame() {
            spaceship = new Spaceship(canvas.width / 2 - 25, canvas.height - 100);
            bullets = [];
            aliens = [];
            alienBullets = [];
            score = 0;
            level = 1;
            gameOver = false;
            restartButton.style.display = "none";
            createAliens();
            updateScore();
            updateLevel();
            gameLoop();
        }

        function createAliens() {
            aliens = [];
            let rows = Math.min(3 + Math.floor(level / 2), 6);
            let cols = Math.min(6 + Math.floor(level / 3), 10);
            
            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    aliens.push(new Alien(50 + col * 60, 50 + row * 60));
                }
            }
        }

        function updateScore() {
            scoreBoard.innerText = `Score: ${score}`;
        }

        function updateLevel() {
            levelBoard.innerText = `Level: ${level}`;
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameOver) {
                ctx.fillStyle = "white";
                ctx.font = "40px Arial";
                ctx.fillText("Game Over", canvas.width / 2 - 100, canvas.height / 2);
                ctx.font = "24px Arial";
                ctx.fillText(`Final Score: ${score}`, canvas.width / 2 - 70, canvas.height / 2 + 40);
                restartButton.style.display = "block";
                return;
            }

            // Update and draw spaceship
            spaceship.draw();

            // Update and draw bullets
            bullets.forEach((bullet, index) => {
                bullet.update();
                bullet.draw();
                if (bullet.y < 0) bullets.splice(index, 1);
            });

            // Update and draw aliens
            aliens.forEach((alien, aIndex) => {
                alien.update();
                alien.draw();

                // Random alien shooting
                if (Math.random() < 0.001 * level) {
                    alien.shoot();
                }

                // Check if alien reached bottom
                if (alien.y + alien.height >= spaceship.y) {
                    gameOver = true;
                }

                // Check bullet collisions
                bullets.forEach((bullet, bIndex) => {
                    if (checkCollision(bullet, alien)) {
                        aliens.splice(aIndex, 1);
                        bullets.splice(bIndex, 1);
                        score += 10;
                        updateScore();
                    }
                });
            });

            // Update and draw alien bullets
            alienBullets.forEach((bullet, index) => {
                bullet.update();
                bullet.draw();

                if (bullet.y > canvas.height) {
                    alienBullets.splice(index, 1);
                }

                if (checkCollision(bullet, spaceship)) {
                    gameOver = true;
                }
            });

            // Check level completion
            if (aliens.length === 0) {
                level++;
                updateLevel();
                createAliens();
            }

            requestAnimationFrame(gameLoop);
        }

        function restartGame() {
            initializeGame();
        }

        // Event listeners
        document.addEventListener("keydown", (event) => {
            if (event.key === "ArrowLeft") spaceship.move("left");
            if (event.key === "ArrowRight") spaceship.move("right");
            if (event.key === " ") spaceship.shoot();
        });

        // Touch controls
        canvas.addEventListener('touchstart', function(e) {
            startX = e.touches[0].clientX;
            spaceship.shoot();
            e.preventDefault();
        });

        canvas.addEventListener('touchmove', function(e) {
            if (startX) {
                let touchX = e.touches[0].clientX;
                let moveDistance = touchX - startX;
                
                if (moveDistance < 0) {
                    spaceship.move("left");
                } else if (moveDistance > 0) {
                    spaceship.move("right");
                }
                startX = touchX;
            }
            e.preventDefault();
        });

        canvas.addEventListener('touchend', function(e) {
            startX = null;
            e.preventDefault();
        });

        // Prevent default touch behavior
        document.body.addEventListener('touchstart', function(e) {
            if (e.target === canvas) {
                e.preventDefault();
            }
        }, { passive: false });

        // Start the game
        initializeGame();
    </script>
</body>
</html>
